<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Jual Barang</title>

<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/product.css">
<link rel="stylesheet" href="../css/upload.css">
<link rel="stylesheet" href="../css/animation.css">

</head>

<body>

<div class="navbar">

<a href="home.html">⬅️</a>

<h2>Jual Barang</h2>

<div></div>

</div>

<div class="container" style="padding-top:75px;padding-bottom:90px;">

<form id="uploadForm">

<div class="photo-card">

<h3 class="photo-title">📷 Foto Produk</h3>

<p class="photo-subtitle">
Tampilkan produkmu dengan foto terbaik
</p>

<input
type="file"
id="images"
multiple
accept="image/*"
hidden>

<div id="photoMain" class="photo-main">

<div
class="photo-placeholder"
onclick="document.getElementById('images').click()">

<div class="plus-circle">+</div>

<p>Tambah Foto</p>

</div>

</div>

<div id="photoThumbs" class="photo-thumbs">

</div>

<div class="photo-tip">

💡 Tips: Foto pertama akan menjadi foto utama yang dilihat pembeli.

</div>

</div>

<label>Judul</label>

<input
type="text"
id="title"
placeholder="Masukkan judul produk">

<label>Deskripsi</label>

<textarea
id="description"
rows="5"
placeholder="Deskripsi produk"></textarea>

<label>Kategori</label>

<select id="category">

<option>Elektronik</option>
<option>Motor</option>
<option>Mobil</option>
<option>Fashion</option>
<option>Gaming</option>
<option>Rumah</option>
<option>Lainnya</option>

</select>

<label>Harga</label>

<input
type="number"
id="price"
placeholder="Harga jual">

<label>Harga Coret</label>

<input
type="number"
id="oldPrice"
placeholder="Opsional">

<label>Lokasi</label>

<input
type="text"
id="location"
placeholder="Lokasi">

<input
type="hidden"
id="latitude">

<input
type="hidden"
id="longitude">

<button
type="button"
class="btn"
onclick="uploadProduct()">

Upload Produk

</button>

</form>

</div>

<script src="../js/api.js"></script>
<script src="../js/upload.js"></script>

</body>

</html>
