<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Daftar - MarketplaceID</title>

<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/register.css">
<link rel="stylesheet" href="../css/animation.css">

</head>

<body>

<div class="register-page fade-in">

<div class="register-box">

<img
src="../assets/logo/logo.png"
class="register-logo">

<h1>Buat Akun</h1>

<p class="subtitle">

Gabung bersama MarketplaceID

</p>

<input
type="text"
id="username"
placeholder="Username">

<input
type="email"
id="email"
placeholder="Email">

<input
type="password"
id="password"
placeholder="Password">

<input
type="password"
id="confirmPassword"
placeholder="Konfirmasi Password">

<button
class="btn"
onclick="register()">

Daftar Sekarang

</button>

<div class="divider">

<span>ATAU</span>

</div>

<button
class="google-btn">

<img
src="../assets/icons/google.png">

Daftar dengan Google

</button>

<div class="login-link">

Sudah punya akun?

<a href="login.html">

Masuk

</a>

</div>

<p
id="message"
class="message">

</p>

</div>

</div>

<script src="../js/api.js"></script>
<script src="../js/helper.js"></script>
<script src="../js/auth.js"></script>

</body>

</html>
