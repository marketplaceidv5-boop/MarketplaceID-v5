<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Edit Produk</title>

<link rel="stylesheet" href="/public/css/style.css">
<link rel="stylesheet" href="/public/css/product.css">
<link rel="stylesheet" href="/public/css/upload.css">
</head>

<body>

<div class="navbar">
<a href="javascript:history.back()">⬅️</a>
<h2>Edit Produk</h2>
<div></div>
</div>

<div class="container" style="padding-top:75px;padding-bottom:90px;">

<div class="photo-card">

<h3 class="photo-title">📷 Foto Produk</h3>

<p class="photo-subtitle">
Ubah foto produkmu
</p>

<input
type="file"
id="images"
multiple
accept="image/*"
hidden>

<div id="photoMain" class="photo-main"></div>

<div id="photoThumbs" class="photo-thumbs"></div>

<div class="photo-tip">
💡 Tambahkan, hapus, atau ubah urutan foto produk.
</div>

</div>

<label>Judul</label>

<input
id="title"
placeholder="Masukkan judul produk">

<label>Deskripsi</label>

<textarea
id="description"
rows="5"
placeholder="Deskripsi produk"></textarea>

<label>Kategori</label>

<select id="category">

<option>Elektronik</option>
<option>Motor</option>
<option>Mobil</option>
<option>Fashion</option>
<option>Gaming</option>
<option>Rumah</option>
<option>Lainnya</option>

</select>

<label>Harga</label>

<input
id="price"
type="number"
placeholder="Harga jual">

<label>Harga Coret</label>

<input
id="oldPrice"
type="number"
placeholder="Opsional">

<label>Lokasi</label>

<input
id="location"
placeholder="Lokasi">

<button
class="btn"
onclick="saveProduct()">

Simpan Perubahan

</button>

</div>

<script src="/public/js/api.js"></script>
<script src="/public/js/edit-product.js"></script>

</body>
</html>
